name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Create deployment directory
        run: |
          mkdir -p _site/Prod_Sanity_Report
          
          # Copy static HTML files
          cp Prod_Sanity_Report/index.html _site/Prod_Sanity_Report/
          cp Prod_Sanity_Report/demo_dashboard.html _site/Prod_Sanity_Report/
          cp Prod_Sanity_Report/sample_reports.html _site/Prod_Sanity_Report/
          
          # Copy sample reports (if they exist)
          cp Prod_Sanity_Report/Production_execution_report_*.html _site/Prod_Sanity_Report/ 2>/dev/null || true
          
          # Copy documentation
          cp Prod_Sanity_Report/README.md _site/Prod_Sanity_Report/
          cp Prod_Sanity_Report/QUICK_START.md _site/Prod_Sanity_Report/
          cp Prod_Sanity_Report/SETUP_GUIDE.md _site/Prod_Sanity_Report/
          cp Prod_Sanity_Report/GITHUB_PAGES_DEPLOYMENT.md _site/Prod_Sanity_Report/
          
          # Create root index.html for redirect
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=Prod_Sanity_Report/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="Prod_Sanity_Report/">Prod_Sanity_Report</a>...</p>
          </body>
          </html>
          EOF
          
          echo "✅ Deployment files prepared"
          ls -la _site/Prod_Sanity_Report/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
