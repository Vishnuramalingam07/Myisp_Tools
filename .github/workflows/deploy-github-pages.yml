name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Create deployment directory
        run: |
          mkdir -p _site
          
          # Copy static HTML files
          cp index.html _site/
          cp demo_dashboard.html _site/
          cp sample_reports.html _site/
          cp report.html _site/
          
          # Copy ALL generated reports
          cp Production_execution_report_*.html _site/ 2>/dev/null || true
          
          # Copy documentation
          cp README.md _site/
          cp QUICK_START.md _site/
          cp SETUP_GUIDE.md _site/
          cp GITHUB_PAGES_DEPLOYMENT.md _site/
          
          echo "✅ Deployment files prepared"
          ls -la _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
