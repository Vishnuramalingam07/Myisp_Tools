name: Fetch ADO Test Results and Update Firebase

on:
  # Run every 1 hour (customize as needed)
  schedule:
    - cron: '0 * * * *'
  
  # ⭐ MANUAL TRIGGER: Click "Run workflow" button in GitHub Actions
  workflow_dispatch:
  
  # Optional: Auto-run when you push to main branch
  # Uncomment below to auto-update on every code push:
  # push:
  #   branches: [ main ]

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Fetch ADO test results
        env:
          # Azure DevOps credentials (stored in GitHub Secrets)
          ADO_PAT: ${{ secrets.ADO_PAT }}
          ADO_ORG: ${{ secrets.ADO_ORG }}
          ADO_PROJECT: ${{ secrets.ADO_PROJECT }}
        run: |
          echo "Fetching test results from Azure DevOps..."
          python ProdSanity_Report.py
          echo "✓ Report generated successfully"
      
      - name: Upload to Firebase
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_DATABASE_URL: "https://myisptools-default-rtdb.firebaseio.com"
        run: |
          echo "Uploading latest results to Firebase..."
          python upload_to_firebase.py
          echo "✓ Firebase updated successfully"
      
      - name: Update live_report.html with latest data
        run: |
          echo "Updating live_report.html with latest report data..."
          # Find the most recent report file
          LATEST_REPORT=$(ls -t Production_execution_report_*.html | head -1)
          if [ -f "$LATEST_REPORT" ]; then
            echo "Found latest report: $LATEST_REPORT"
            # Add Firebase integration to the report
            python add_firebase_integration.py "$LATEST_REPORT" live_report.html
            echo "✓ Updated live_report.html with Firebase integration"
          else
            echo "⚠️ No report file found"
            exit 1
          fi
      
      - name: Commit and push updated live report
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions Bot"
          git add live_report.html latest_report.json || true
          git diff --staged --quiet || git commit -m "Auto-update: Latest report data from ADO ($(date +'%Y-%m-%d %H:%M UTC'))"
          git push || echo "No changes to push"
      
      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-report
          path: Production_execution_report_*.html
          retention-days: 30
      
      - name: Summary
        run: |
          echo "### ✅ Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ADO data fetched" >> $GITHUB_STEP_SUMMARY
          echo "- Firebase updated" >> $GITHUB_STEP_SUMMARY
          echo "- Report archived" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View live report: https://vishnuramalingam07.github.io/Myisp_Tools/live_report.html" >> $GITHUB_STEP_SUMMARY
